<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Guesty LIVE Fetch Debug</title>
  <style>
    body { font-family: Arial, sans-serif; background: #fff; padding: 2rem; }
    table { border-collapse: collapse; width: 100%; background: #fafcff; }
    th, td { border: 1px solid #eee; padding: 7px; font-size: 13px; }
    th { background: #224488; color: #fff; }
    tr:nth-child(even) { background: #f4faff }
    .error { color: #c00; font-weight: bold; }
    textarea { width: 100%; height: 150px; font-family: monospace; margin-top: 20px; }
    #table { margin-top: 30px; }
  </style>
</head>
<body>
  <h2>Guesty LIVE Fetch Debug</h2>
  <div id="info"><em>Fetching...</em></div>
  <textarea id="raw" readonly></textarea>
  <div id="table"></div>
  <script>
    const url = "https://report.guesty.com/apps/reservations?apiKey=b85a2d1c4f355f5f041c70eadfb3b7dff9696f4a3cca86bd557e0d21d7bca8bdb4e868d1ae93a2eb731392370ff7a2d83252648102099d8d5bd700ff49ae5cad";
    const info = document.getElementById('info');
    const tableDiv = document.getElementById('table');
    const raw = document.getElementById('raw');
    async function fetchReport() {
      info.textContent = 'Fetching Guesty data...';
      try {
        const response = await fetch(url);
        const text = await response.text();
        raw.value = text;
        try {
          const data = JSON.parse(text);
          info.innerHTML = 'Successfully loaded data. See table and raw JSON below.<br>(Open your browser console for real-time logs.)';
          console.log('Guesty data:', data);
          const rows = data.reservations || data.results || [];
          let html = "<table><tr><th>Address</th><th>City</th><th>Gross Payout</th><th>State Tax</th><th>City Tax</th><th>County Tax</th></tr>";
          for (const r of rows) {
            html += `<tr>
              <td>${r.listing?.address?.full || ''}</td>
              <td>${r.listing?.address?.city || ''}</td>
              <td>${Number(r.money?.hostPayout||0).toFixed(2)}</td>
              <td>${Number(r.money?.invoiceItems?.STATE_TAX||0).toFixed(2)}</td>
              <td>${Number(r.money?.invoiceItems?.CITY_TAX||0).toFixed(2)}</td>
              <td>${Number(r.taxCounty||r.taxOccupancy||0).toFixed(2)}</td>
            </tr>`;
          }
          html += "</table>";
          tableDiv.innerHTML = html;
        } catch (jsonErr) {
          info.innerHTML = `<span class="error">ERROR: Got a response that is not JSON.<br>You may see "Unexpected token &lt;" if Guesty is sending HTML instead of reservations data.<br>
          See raw response below.<br>Browser console will show more details.</span>`;
          console.error('JSON parse error:', jsonErr);
        }
      } catch (err) {
        info.innerHTML = `<span class="error">Fetch ERROR: ${err.message}</span>`;
        raw.value = "";
        tableDiv.innerHTML = "";
        console.error('Fetch error:', err);
      }
    }
    fetchReport();
  </script>
</body>
</html>
