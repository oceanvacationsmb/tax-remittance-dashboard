<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8"/>
  <title>Guesty Tax Report</title>
</head>
<body>
  <h2>Guesty Tax & Payout Report</h2>
  <label>
    Paste your Guesty report link here:
    <input type="text" id="reportUrl" size="80" value="https://report.guesty.com/apps/reservations?apiKey=7f3238d31268cf54dfca061c8bf8675d948c08b2b4d2647cc1f4edc3d58af436e4c97a3ee106b6c7908c5339dbc1a65ac5cbe943751b666e63ed8d1e9f04326c">
  </label>
  <button onclick="fetchReport()">Load Report</button>

  <div id="result"></div>

  <script>
    async function fetchReport() {
      const url = document.getElementById('reportUrl').value;
      const result = document.getElementById('result');
      result.textContent = "Loading...";
      try {
        const resp = await fetch(url);
        if (!resp.ok) throw new Error("Could not fetch Guesty report");
        const data = await resp.json();
        if (!data.reservations && !data.results) {
          result.textContent = "No data found in report.";
          return;
        }
        const rows = data.reservations || data.results || [];
        // Filter logic: tax collected, VRBO/website/manual
        const filtered = rows.filter(r => {
          const source = (r.source || "").toLowerCase();
          const tax =
            Number(r.money?.invoiceItems?.CITY_TAX || 0) > 0 ||
            Number(r.money?.invoiceItems?.STATE_TAX || 0) > 0 ||
            Number(r.taxCounty || 0) > 0 ||
            Number(r.taxOccupancy || 0) > 0;
          return tax && (["vrbo", "website", "manual", "direct"].includes(source));
        });
        // Mapping logic for county/municipality
        function getCounty(city) {
          city = city.toLowerCase();
          if (city === 'myrtle beach' || city === 'surfside beach' || city === 'north myrtle beach') return "Horry County";
          if (city === 'murrells inlet') return "Georgetown County";
          return "";
        }
        function getMunicipality(city) {
          if (!city) return '';
          return city;
        }
        let html = `<table border="1" cellpadding="3" style="border-collapse:collapse;">
          <tr>
            <th>PROPERTY ADDRESS</th>
            <th>GROSS PAYOUT</th>
            <th>NAME OF STATE</th>
            <th>NAME OF CITY</th>
            <th>NAME OF COUNTY</th>
            <th>MUNICIPALITY</th>
            <th>CITY TAX</th>
            <th>STATE TAX</th>
            <th>COUNTY TAX</th>
            <th>TOTAL COLLECTED</th>
            <th>TOTAL TO PAY</th>
            <th>SOURCE</th>
          </tr>`;
        filtered.forEach(r => {
          const addr = r.listing?.address || {};
          const payout = Number(r.money?.hostPayout || 0);
          const cityTax = Number(r.money?.invoiceItems?.CITY_TAX || 0);
          const stateTax = Number(r.money?.invoiceItems?.STATE_TAX || 0);
          const countyTax = Number(r.taxCounty || r.taxOccupancy || 0);
          const totalCollected = cityTax + stateTax + countyTax;
          html += `<tr>
            <td>${addr.full || ""}</td>
            <td>${payout.toFixed(2)}</td>
            <td>${addr.state || "SC"}</td>
            <td>${addr.city || ""}</td>
            <td>${getCounty(addr.city || "")}</td>
            <td>${getMunicipality(addr.city || "")}</td>
            <td>${cityTax.toFixed(2)}</td>
            <td>${stateTax.toFixed(2)}</td>
            <td>${countyTax.toFixed(2)}</td>
            <td>${totalCollected.toFixed(2)}</td>
            <td>${(payout - totalCollected).toFixed(2)}</td>
            <td>${r.source || ""}</td>
          </tr>`;
        });
        html += "</table>";
        result.innerHTML = html;
      } catch (e) {
        result.textContent = "Error: " + e.message;
      }
    }
  </script>
</body>
</html>
