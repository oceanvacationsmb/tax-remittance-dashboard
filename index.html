<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Report Taxes</title>
  <style>
    *{box-sizing:border-box;margin:0;padding:0}
    body{
      font-family:Arial,sans-serif;
      background:#f4f6f8;
      color:#16313a;
      padding:24px;
    }
    .wrap{
      max-width:1500px;
      margin:0 auto;
      background:#fff;
      border:1px solid #d7e1e6;
      border-radius:14px;
      padding:24px;
      box-shadow:0 8px 24px rgba(0,0,0,.06);
    }
    h1{
      text-align:center;
      font-size:34px;
      margin-bottom:18px;
      letter-spacing:.5px;
    }
    .toolbar{
      display:grid;
      grid-template-columns:1.6fr 120px 140px 180px;
      gap:12px;
      align-items:end;
      margin-bottom:20px;
    }
    label{
      display:block;
      font-size:12px;
      font-weight:bold;
      color:#4a6871;
      margin-bottom:6px;
      text-transform:uppercase;
    }
    input,button{
      width:100%;
      padding:11px 12px;
      border-radius:8px;
      border:1px solid #ccd7dc;
      font-size:14px;
    }
    button{
      border:none;
      background:#0d5c4b;
      color:#fff;
      font-weight:bold;
      cursor:pointer;
    }
    button:hover{background:#0b4e40}
    .status{
      display:none;
      margin-bottom:16px;
      padding:12px 14px;
      border-radius:8px;
      font-size:14px;
    }
    .status.show{display:block}
    .status.ok{
      background:#e9f7ee;
      border:1px solid #badfc5;
      color:#1a6b39;
    }
    .status.error{
      background:#fde9e9;
      border:1px solid #eebaba;
      color:#a12222;
    }
    .cards{
      display:grid;
      grid-template-columns:repeat(4,minmax(180px,1fr));
      gap:12px;
      margin-bottom:22px;
    }
    .card{
      border:1px solid #d8e2e7;
      border-radius:10px;
      background:#fbfdfe;
      padding:16px;
    }
    .card-label{
      font-size:11px;
      font-weight:bold;
      color:#607983;
      text-transform:uppercase;
      margin-bottom:8px;
    }
    .card-value{
      font-size:24px;
      font-weight:bold;
    }
    table{
      width:100%;
      border-collapse:collapse;
      margin-top:10px;
    }
    th,td{
      border:1px solid #d8e2e7;
      padding:10px 12px;
      text-align:left;
      font-size:14px;
    }
    th{
      background:#eef4f7;
      text-transform:uppercase;
      font-size:12px;
    }
    td.right, th.right{text-align:right}
    tr:nth-child(even){background:#fafcfd}
    .note{
      margin-top:14px;
      font-size:12px;
      color:#61767f;
    }
    @media(max-width:980px){
      .toolbar{grid-template-columns:1fr}
      .cards{grid-template-columns:1fr 1fr}
    }
  </style>
</head>
<body>
  <div class="wrap">
    <h1>📊 REPORT TAXES</h1>

    <div class="toolbar">
      <div>
        <label for="reportUrl">Guesty Report URL</label>
        <input id="reportUrl" type="text" />
      </div>
      <div>
        <label for="month">Month</label>
        <input id="month" type="number" min="1" max="12" />
      </div>
      <div>
        <label for="year">Year</label>
        <input id="year" type="number" min="2020" max="2100" />
      </div>
      <div>
        <button id="runBtn">RUN REPORT</button>
      </div>
    </div>

    <div id="status" class="status"></div>

    <div id="cards" class="cards" style="display:none;">
      <div class="card">
        <div class="card-label">Properties</div>
        <div id="sumProperties" class="card-value">0</div>
      </div>
      <div class="card">
        <div class="card-label">Reservations Used</div>
        <div id="sumReservations" class="card-value">0</div>
      </div>
      <div class="card">
        <div class="card-label">Amount To Report</div>
        <div id="sumAmount" class="card-value">$0.00</div>
      </div>
      <div class="card">
        <div class="card-label">Total Tax</div>
        <div id="sumTax" class="card-value">$0.00</div>
      </div>
    </div>

    <div id="tableWrap"></div>

    <div class="note">
      REPORT TAX TO is generated from the property city.
    </div>
  </div>

  <script>
    // =========================================================
    // 1) PASTE YOUR REPORT URL HERE
    // =========================================================
    const DEFAULT_REPORT_URL = "https://report.guesty.com/apps/reservations?apiKey=REPLACE_WITH_YOUR_KEY";

    // =========================================================
    // 2) CITY -> REPORT TAX TO MAP
    // Change these codes if you want different labels
    // =========================================================
    const CITY_REPORT_MAP = {
      "myrtle beach": "SC, MB, HC",
      "north myrtle beach": "SC, NMB, HC",
      "surfside beach": "SC, SSB, HC",
      "garden city": "SC, HC",
      "murrells inlet": "SC, HC",
      "conway": "SC, HC"
    };

    function num(v){
      return parseFloat((v || "0").toString().replace(/[$,]/g, "")) || 0;
    }

    function money(v){
      const n = parseFloat(v) || 0;
      return "$" + n.toLocaleString("en-US", {
        minimumFractionDigits: 2,
        maximumFractionDigits: 2
      });
    }

    function escapeHtml(v){
      return String(v || "")
        .replace(/&/g, "&amp;")
        .replace(/</g, "&lt;")
        .replace(/>/g, "&gt;")
        .replace(/"/g, "&quot;")
        .replace(/'/g, "&#39;");
    }

    function showStatus(message, type){
      const el = document.getElementById("status");
      el.className = "status show " + (type || "");
      el.textContent = message;
    }

    function extractApiKeyFromUrl(url){
      return (url.split("apiKey=")[1] || "").split("&")[0];
    }

    function getDateRange(month, year){
      const mm = String(month).padStart(2, "0");
      const last = new Date(year, month, 0).getDate();
      return {
        from: `${year}-${mm}-01`,
        to: `${year}-${mm}-${String(last).padStart(2, "0")}`
      };
    }

    function getNestedValue(obj, path){
      if(!obj || !path) return undefined;
      const keys = path.split(".");
      let cur = obj;
      for(const key of keys){
        if(cur === undefined || cur === null || typeof cur !== "object" || !(key in cur)) return undefined;
        cur = cur[key];
      }
      return cur;
    }

    function getMoneyField(obj, path){
      const raw = getNestedValue(obj, path);
      if(raw === undefined || raw === null || raw === "") return 0;
      if(typeof raw === "number" || typeof raw === "string") return num(raw);
      if(typeof raw === "object"){
        if(raw.value !== undefined && raw.value !== null) return num(raw.value);
        if(raw.children !== undefined && raw.children !== null && typeof raw.children !== "object") return num(raw.children);
      }
      return 0;
    }

    function getTextField(obj, path){
      const raw = getNestedValue(obj, path);
      if(raw === undefined || raw === null) return "";
      if(typeof raw === "string" || typeof raw === "number") return String(raw).trim();
      if(typeof raw === "object"){
        if(raw.children !== undefined && raw.children !== null && typeof raw.children !== "object") return String(raw.children).trim();
        if(raw.value !== undefined && raw.value !== null) return String(raw.value).trim();
      }
      return "";
    }

    function mapGuestyReservation(r){
      return {
        grossPayout: getMoneyField(r, "money.hostPayout"),
        cityTax: getMoneyField(r, "money.invoiceItems.CITY_TAX"),
        stateTax: getMoneyField(r, "money.invoiceItems.STATE_TAX"),
        countyTax: getMoneyField(r, "taxCounty"),
        occupancyTax: getMoneyField(r, "taxOccupancy"),
        address: getTextField(r, "listing.address.full"),
        source: getTextField(r, "source"),
        city: getTextField(r, "listing.address.city"),
        checkIn: getTextField(r, "checkIn"),
        nickname: getTextField(r, "listing.nickname"),
        confirmationCode: getTextField(r, "confirmationCode")
      };
    }

    function getPropertyName(row){
      return row.nickname || row.address || "Unknown";
    }

    function getRowTaxTotal(row){
      return num(row.cityTax) + num(row.stateTax) + num(row.countyTax) + num(row.occupancyTax);
    }

    function isVrboOrDirect(row){
      const source = (row.source || "").toLowerCase().trim();

      if(!source) return false;
      if(source.includes("airbnb")) return false;

      return (
        source.includes("vrbo") ||
        source.includes("direct") ||
        source.includes("website") ||
        source.includes("manual")
      );
    }

    function getReportTaxTo(city){
      const key = (city || "").toLowerCase().trim();
      return CITY_REPORT_MAP[key] || "SC, HC";
    }

    async function fetchGuestyRows(reportUrl){
      const apiKey = extractApiKeyFromUrl(reportUrl);
      if(!apiKey) throw new Error("Missing apiKey in Guesty URL");

      const endpoint = "https://report.guesty.com/api/shared-reservations-reports?timezone=America/New_York&skip=0&limit=1000";

      const res = await fetch(endpoint, {
        headers: {
          "accept": "*/*",
          "authorization": apiKey,
          "content-type": "application/json"
        }
      });

      if(!res.ok){
        throw new Error("Guesty fetch failed: " + res.status);
      }

      const payload = await res.json();
      const rows = Array.isArray(payload) ? payload : (payload.results || payload.data || []);
      return rows.map(mapGuestyReservation);
    }

    async function runReport(){
      document.getElementById("cards").style.display = "none";
      document.getElementById("tableWrap").innerHTML = "";
      showStatus("Loading Guesty data...", "ok");

      const reportUrl = document.getElementById("reportUrl").value.trim();
      const month = parseInt(document.getElementById("month").value, 10);
      const year = parseInt(document.getElementById("year").value, 10);

      if(!reportUrl) return showStatus("Paste the Guesty report URL first", "error");
      if(!(month >= 1 && month <= 12)) return showStatus("Enter a valid month", "error");
      if(!(year >= 2020 && year <= 2100)) return showStatus("Enter a valid year", "error");

      try{
        const rows = await fetchGuestyRows(reportUrl);
        const { from, to } = getDateRange(month, year);

        const filtered = rows.filter(row => {
          const tax = getRowTaxTotal(row);
          return (
            row.checkIn &&
            row.checkIn >= from &&
            row.checkIn <= to &&
            isVrboOrDirect(row) &&
            num(row.grossPayout) > 0 &&
            tax > 0
          );
        });

        const byProperty = {};
        let totalReservations = 0;
        let totalAmount = 0;
        let totalTax = 0;

        filtered.forEach(row => {
          const propertyName = getPropertyName(row);
          const tax = getRowTaxTotal(row);
          const amountToReport = Math.max(0, num(row.grossPayout) - tax);

          if(!byProperty[propertyName]){
            byProperty[propertyName] = {
              property: propertyName,
              reportTo: getReportTaxTo(row.city),
              amountToReport: 0,
              totalTax: 0
            };
          }

          byProperty[propertyName].amountToReport += amountToReport;
          byProperty[propertyName].totalTax += tax;

          totalReservations++;
          totalAmount += amountToReport;
          totalTax += tax;
        });

        const keys = Object.keys(byProperty).sort((a,b) => a.localeCompare(b));

        let html = "<table>";
        html += "<tr><th>Property Name</th><th>Report Tax To</th><th class='right'>Amount To Report</th><th class='right'>Total Tax</th></tr>";

        if(!keys.length){
          html += "<tr><td colspan='4'>No VRBO / Direct / Website / Manual reservations with payout and taxes found for this period.</td></tr>";
        } else {
          keys.forEach(key => {
            const item = byProperty[key];
            html += "<tr>";
            html += "<td>" + escapeHtml(item.property) + "</td>";
            html += "<td>" + escapeHtml(item.reportTo) + "</td>";
            html += "<td class='right'>" + money(item.amountToReport) + "</td>";
            html += "<td class='right'>" + money(item.totalTax) + "</td>";
            html += "</tr>";
          });

          html += "<tr>";
          html += "<th>Total</th>";
          html += "<th></th>";
          html += "<th class='right'>" + money(totalAmount) + "</th>";
          html += "<th class='right'>" + money(totalTax) + "</th>";
          html += "</tr>";
        }

        html += "</table>";
        document.getElementById("tableWrap").innerHTML = html;

        document.getElementById("cards").style.display = "";
        document.getElementById("sumProperties").textContent = keys.length;
        document.getElementById("sumReservations").textContent = totalReservations;
        document.getElementById("sumAmount").textContent = money(totalAmount);
        document.getElementById("sumTax").textContent = money(totalTax);

        showStatus("Report loaded successfully", "ok");
      } catch(err){
        showStatus(err.message || "Failed loading report", "error");
      }
    }

    const now = new Date();
    document.getElementById("reportUrl").value = DEFAULT_REPORT_URL;
    document.getElementById("month").value = now.getMonth() + 1;
    document.getElementById("year").value = now.getFullYear();
    document.getElementById("runBtn").addEventListener("click", runReport);
  </script>
</body>
</html>
