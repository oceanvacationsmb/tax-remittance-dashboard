<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Report Taxes</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: Arial, sans-serif;
      background: #f4f6f8;
      color: #16313a;
      padding: 24px;
    }

    .wrap {
      max-width: 1500px;
      margin: 0 auto;
      background: #fff;
      border: 1px solid #d7e1e6;
      border-radius: 14px;
      padding: 24px;
      box-shadow: 0 8px 24px rgba(0,0,0,.06);
    }

    h1 {
      text-align: center;
      font-size: 34px;
      margin-bottom: 18px;
      letter-spacing: .5px;
    }

    .toolbar {
      display: grid;
      grid-template-columns: 180px 180px 220px;
      gap: 12px;
      align-items: end;
      justify-content: center;
      margin-bottom: 20px;
    }

    label {
      display: block;
      font-size: 12px;
      font-weight: bold;
      color: #4a6871;
      margin-bottom: 6px;
      text-transform: uppercase;
    }

    select, button {
      width: 100%;
      padding: 11px 12px;
      border-radius: 8px;
      border: 1px solid #ccd7dc;
      font-size: 14px;
      background: #fff;
    }

    button {
      border: none;
      background: #0d5c4b;
      color: #fff;
      font-weight: bold;
      cursor: pointer;
    }

    button:hover {
      background: #0b4e40;
    }

    .status {
      display: none;
      margin-bottom: 16px;
      padding: 12px 14px;
      border-radius: 8px;
      font-size: 14px;
      white-space: pre-wrap;
    }

    .status.show { display: block; }
    .status.ok {
      background: #e9f7ee;
      border: 1px solid #badfc5;
      color: #1a6b39;
    }

    .status.error {
      background: #fde9e9;
      border: 1px solid #eebaba;
      color: #a12222;
    }

    .cards {
      display: grid;
      grid-template-columns: repeat(4, minmax(180px, 1fr));
      gap: 12px;
      margin-bottom: 22px;
    }

    .card {
      border: 1px solid #d8e2e7;
      border-radius: 10px;
      background: #fbfdfe;
      padding: 16px;
    }

    .card-label {
      font-size: 11px;
      font-weight: bold;
      color: #607983;
      text-transform: uppercase;
      margin-bottom: 8px;
    }

    .card-value {
      font-size: 24px;
      font-weight: bold;
    }

    table {
      width: 100%;
      border-collapse: collapse;
      margin-top: 10px;
    }

    th, td {
      border: 1px solid #d8e2e7;
      padding: 10px 12px;
      text-align: left;
      font-size: 14px;
    }

    th {
      background: #eef4f7;
      text-transform: uppercase;
      font-size: 12px;
    }

    td.right, th.right {
      text-align: right;
    }

    tr:nth-child(even) {
      background: #fafcfd;
    }

    .note {
      margin-top: 14px;
      font-size: 12px;
      color: #61767f;
    }

    @media (max-width: 980px) {
      .toolbar { grid-template-columns: 1fr; }
      .cards { grid-template-columns: 1fr 1fr; }
    }
  </style>
</head>
<body>
  <div class="wrap">
    <h1>📊 REPORT TAXES</h1>

    <div class="toolbar">
      <div>
        <label for="monthSelect">Month</label>
        <select id="monthSelect"></select>
      </div>
      <div>
        <label for="yearSelect">Year</label>
        <select id="yearSelect"></select>
      </div>
      <div>
        <button id="runBtn" type="button">RUN REPORT</button>
      </div>
    </div>

    <div id="status" class="status"></div>

    <div id="cards" class="cards" style="display:none;">
      <div class="card">
        <div class="card-label">Properties</div>
        <div id="sumProperties" class="card-value">0</div>
      </div>
      <div class="card">
        <div class="card-label">Reservations Used</div>
        <div id="sumReservations" class="card-value">0</div>
      </div>
      <div class="card">
        <div class="card-label">Amount To Report</div>
        <div id="sumAmount" class="card-value">$0.00</div>
      </div>
      <div class="card">
        <div class="card-label">Total Tax</div>
        <div id="sumTax" class="card-value">$0.00</div>
      </div>
    </div>

    <div id="tableWrap"></div>

    <div class="note">
      Report Tax To is based on city parsed from Guesty city first, then from address if city is blank.
    </div>
  </div>

  <script>
    const REPORT_URL = "https://report.guesty.com/apps/reservations?apiKey=b85a2d1c4f355f5f041c70eadfb3b7dff9696f4a3cca86bd557e0d21d7bca8bdb4e868d1ae93a2eb731392370ff7a2d83252648102099d8d5bd700ff49ae5cad";

    const CITY_REPORT_MAP = {
      "myrtle beach": "SC, MB, HC",
      "north myrtle beach": "SC, NMB, HC",
      "surfside beach": "SC, SSB, HC",
      "garden city": "SC, HC",
      "murrells inlet": "SC, HC",
      "conway": "SC, HC"
    };

    function num(v) {
      return parseFloat((v || "0").toString().replace(/[$,]/g, "")) || 0;
    }

    function money(v) {
      const n = parseFloat(v) || 0;
      return "$" + n.toLocaleString("en-US", {
        minimumFractionDigits: 2,
        maximumFractionDigits: 2
      });
    }

    function escapeHtml(v) {
      return String(v || "")
        .replace(/&/g, "&amp;")
        .replace(/</g, "&lt;")
        .replace(/>/g, "&gt;")
        .replace(/"/g, "&quot;")
        .replace(/'/g, "&#39;");
    }

    function showStatus(message, type) {
      const el = document.getElementById("status");
      el.className = "status show " + (type || "");
      el.textContent = message;
    }

    function extractApiKeyFromUrl(url) {
      return (url.split("apiKey=")[1] || "").split("&")[0];
    }

    function getNestedValue(obj, path) {
      if (!obj || !path) return undefined;
      const keys = path.split(".");
      let cur = obj;

      for (const key of keys) {
        if (cur === undefined || cur === null || typeof cur !== "object" || !(key in cur)) {
          return undefined;
        }
        cur = cur[key];
      }
      return cur;
    }

    function extractGuestyMoneyValue(raw) {
      if (raw === undefined || raw === null || raw === "") return 0;

      if (typeof raw === "number" || typeof raw === "string") {
        return num(raw);
      }

      if (typeof raw === "object") {
        if (raw.value !== undefined && raw.value !== null) return num(raw.value);
        if (raw.children !== undefined && raw.children !== null && typeof raw.children !== "object") {
          return num(raw.children);
        }
      }

      return 0;
    }

    function guestyText(obj, path) {
      const direct = obj ? obj[path] : undefined;
      const raw = (direct !== undefined && direct !== null) ? direct : getNestedValue(obj, path);

      if (raw === undefined || raw === null) return "";

      if (typeof raw === "string" || typeof raw === "number") {
        return String(raw).trim();
      }

      if (typeof raw === "object") {
        if (raw.children !== undefined && raw.children !== null) {
          if (typeof raw.children === "string" || typeof raw.children === "number") {
            return String(raw.children).trim();
          }
        }
        if (raw.value !== undefined && raw.value !== null) {
          return String(raw.value).trim();
        }
      }

      return "";
    }

    function guestyValue(obj, path) {
      const direct = obj ? obj[path] : undefined;
      const raw = (direct !== undefined && direct !== null) ? direct : getNestedValue(obj, path);
      return extractGuestyMoneyValue(raw);
    }

    function getInvoiceItemsArray(r) {
      const directArray =
        getNestedValue(r, "money.invoiceItems.children") ||
        getNestedValue(r, "invoiceItems.children") ||
        [];

      if (Array.isArray(directArray)) return directArray;

      if (Array.isArray(r["money.invoiceItems"])) return r["money.invoiceItems"];
      if (Array.isArray(r.invoiceItems)) return r.invoiceItems;

      return [];
    }

    function getInvoiceItemsTaxTotal(r) {
      const items = getInvoiceItemsArray(r);

      return items.reduce((sum, item) => {
        const title = ((item && item.title) || "").toString().toLowerCase();
        const name = ((item && item.name) || "").toString().toLowerCase();
        const description = ((item && item.description) || "").toString().toLowerCase();
        const type = ((item && item.type) || "").toString().toLowerCase();
        const label = (title + " " + name + " " + description + " " + type).trim();
        const val = num(item && item.value);

        const isTaxLike =
          type.includes("tax") ||
          label.includes(" tax") ||
          label.includes("tax ") ||
          label.includes("occupancy") ||
          label.includes("tourism") ||
          label.includes("lodging") ||
          label.includes("accommodation tax");

        if (!isTaxLike) return sum;
        return sum + Math.max(0, val);
      }, 0);
    }

    function parseCityFromAddress(address) {
      const a = (address || "").toLowerCase();

      if (a.includes("north myrtle beach")) return "North Myrtle Beach";
      if (a.includes("myrtle beach")) return "Myrtle Beach";
      if (a.includes("surfside beach")) return "Surfside Beach";
      if (a.includes("garden city")) return "Garden City";
      if (a.includes("murrells inlet")) return "Murrells Inlet";
      if (a.includes("conway")) return "Conway";

      return "";
    }

    function mapGuestyReservation(r) {
      const propertyAddress =
        guestyText(r, "listing.address.full") ||
        guestyText(r, "listing.address") ||
        guestyText(r, "customFields.68e44b138e7b460011d90661") ||
        guestyText(r, "customFields.68e44b138e7b460011d90661.value") ||
        guestyText(r, "customFields.68e44b138e7b460011d90661.children") ||
        "";

      const cityTax = Math.max(
        guestyValue(r, "money.invoiceItems.CITY_TAX"),
        guestyValue(r, "taxCity")
      );

      const stateTax = Math.max(
        guestyValue(r, "money.invoiceItems.STATE_TAX"),
        guestyValue(r, "taxState")
      );

      const countyTax = Math.max(
        guestyValue(r, "taxCounty"),
        guestyValue(r, "money.invoiceItems.COUNTY_TAX")
      );

      const occupancyTax = Math.max(
        guestyValue(r, "taxOccupancy"),
        guestyValue(r, "money.invoiceItems.OCCUPANCY_TAX")
      );

      const city =
        guestyText(r, "listing.address.city") ||
        parseCityFromAddress(propertyAddress);

      const source =
        guestyText(r, "source") ||
        guestyText(r, "integration.nickname") ||
        guestyText(r, "platform");

      const totalPayout = Math.max(
        guestyValue(r, "money.hostPayout"),
        guestyValue(r, "money.hostPayoutUsd"),
        guestyValue(r, "totalPayout"),
        guestyValue(r, "money.totalPayout")
      );

      return {
        "CHECK-IN DATE":
          (r.checkInDate && r.checkInDate.value) ||
          guestyText(r, "checkInDate.value") ||
          guestyText(r, "checkIn") ||
          "",

        "CHECK-OUT DATE":
          (r.checkOutDate && r.checkOutDate.value) ||
          guestyText(r, "checkOutDate.value") ||
          guestyText(r, "checkOut") ||
          "",

        "LISTING'S NICKNAME":
          (r["listing.nickname"] && r["listing.nickname"].children) ||
          guestyText(r, "listing.nickname.children") ||
          guestyText(r, "listing.nickname") ||
          "",

        "PROPERTY ADDRESS": propertyAddress,
        "CITY": city,
        "SOURCE": source,
        "TOTAL PAYOUT": totalPayout,

        "CITY TAX": cityTax,
        "STATE TAX": stateTax,
        "COUNTY TAX": countyTax,
        "OCCUPANCY TAX": occupancyTax,

        "TAXES": Math.max(
          cityTax + stateTax + countyTax + occupancyTax,
          getInvoiceItemsTaxTotal(r)
        )
      };
    }

    function getRowTaxTotal(row) {
      const detailedKeys = [
        "CITY TAX", "STATE TAX", "COUNTY TAX", "OCCUPANCY TAX",
        "CITY TAXES", "STATE TAXES", "COUNTY TAXES", "OCCUPANCY TAXES",
        "ACCOMMODATION TAX", "TOURISM TAX", "LODGING TAX"
      ];

      const taxesCombined = num(row["TAXES"]);
      const detailedTaxesCombined = detailedKeys.reduce((sum, key) => sum + num(row[key]), 0);

      return Math.max(0, taxesCombined, detailedTaxesCombined);
    }

    function getReportTaxTo(city) {
      const key = (city || "").toLowerCase().trim();
      return CITY_REPORT_MAP[key] || "SC, HC";
    }

    function normalizeRowsFromPayload(payload) {
      if (Array.isArray(payload)) return payload;
      if (Array.isArray(payload.results)) return payload.results;
      if (Array.isArray(payload.data)) return payload.data;
      if (payload.data && Array.isArray(payload.data.results)) return payload.data.results;
      if (payload.data && Array.isArray(payload.data.rows)) return payload.data.rows;
      if (Array.isArray(payload.rows)) return payload.rows;
      return [];
    }

    async function fetchGuestyRows() {
      const apiKey = extractApiKeyFromUrl(REPORT_URL);
      if (!apiKey) throw new Error("Missing apiKey in Guesty URL");

      const endpoint = "https://report.guesty.com/api/shared-reservations-reports?timezone=America/New_York&skip=0&limit=1000";

      const res = await fetch(endpoint, {
        method: "GET",
        headers: {
          "accept": "*/*",
          "authorization": apiKey,
          "content-type": "application/json"
        }
      });

      if (!res.ok) throw new Error("Guesty fetch failed: " + res.status);

      const payload = await res.json();
      const rows = normalizeRowsFromPayload(payload);
      return rows.map(mapGuestyReservation);
    }

    function getDateRange(month, year) {
      const mm = String(month).padStart(2, "0");
      const last = new Date(year, month, 0).getDate();

      return {
        from: `${year}-${mm}-01`,
        to: `${year}-${mm}-${String(last).padStart(2, "0")}`
      };
    }

    function renderEmptyTable(message) {
      document.getElementById("tableWrap").innerHTML = `
        <table>
          <tr>
            <th>Property Name</th>
            <th>Report Tax To</th>
            <th class="right">Amount To Report</th>
            <th class="right">Total Tax</th>
          </tr>
          <tr>
            <td colspan="4">${escapeHtml(message)}</td>
          </tr>
        </table>
      `;
    }

    async function runReport() {
      document.getElementById("cards").style.display = "none";
      document.getElementById("tableWrap").innerHTML = "";
      showStatus("Loading Guesty data...", "ok");

      try {
        const month = parseInt(document.getElementById("monthSelect").value, 10);
        const year = parseInt(document.getElementById("yearSelect").value, 10);
        const rows = await fetchGuestyRows();
        const { from, to } = getDateRange(month, year);

        console.log("RAW MAPPED ROWS", rows.slice(0, 10));

        const filtered = rows.filter(row => {
          const checkIn = (row["CHECK-IN DATE"] || "").toString().trim();
          const payout = num(row["TOTAL PAYOUT"]);
          const tax = getRowTaxTotal(row);
          const source = ((row["SOURCE"] || "") + "").toLowerCase().trim();

          if (!checkIn) return false;
          if (checkIn < from || checkIn > to) return false;
          if (!source) return false;
          if (source.includes("airbnb")) return false;

          const keepSource =
            source.includes("vrbo") ||
            source.includes("direct") ||
            source.includes("website") ||
            source.includes("manual");

          if (!keepSource) return false;
          if (payout <= 0) return false;
          if (tax <= 0) return false;

          return true;
        });

        console.log("FILTERED ROWS", filtered.slice(0, 20));

        const byProperty = {};
        let totalReservations = 0;
        let totalAmount = 0;
        let totalTax = 0;

        filtered.forEach(row => {
          const propertyName =
            (row["LISTING'S NICKNAME"] || "").toString().trim() ||
            (row["PROPERTY ADDRESS"] || "").toString().trim() ||
            "Unknown";

          const city = (row["CITY"] || "").toString().trim();
          const payout = num(row["TOTAL PAYOUT"]);
          const tax = getRowTaxTotal(row);
          const amountToReport = Math.max(0, payout - tax);

          if (!byProperty[propertyName]) {
            byProperty[propertyName] = {
              property: propertyName,
              reportTo: getReportTaxTo(city),
              amountToReport: 0,
              totalTax: 0
            };
          }

          byProperty[propertyName].amountToReport += amountToReport;
          byProperty[propertyName].totalTax += tax;

          totalReservations++;
          totalAmount += amountToReport;
          totalTax += tax;
        });

        const keys = Object.keys(byProperty).sort((a, b) => a.localeCompare(b));

        document.getElementById("cards").style.display = "";
        document.getElementById("sumProperties").textContent = keys.length;
        document.getElementById("sumReservations").textContent = totalReservations;
        document.getElementById("sumAmount").textContent = money(totalAmount);
        document.getElementById("sumTax").textContent = money(totalTax);

        if (!keys.length) {
          renderEmptyTable("No matching taxed VRBO / Direct / Website / Manual reservations found for this month.");
          showStatus("Information loaded. 0 matching reservations found.", "ok");
          return;
        }

        let html = "<table>";
        html += "<tr><th>Property Name</th><th>Report Tax To</th><th class='right'>Amount To Report</th><th class='right'>Total Tax</th></tr>";

        keys.forEach(key => {
          const item = byProperty[key];
          html += "<tr>";
          html += "<td>" + escapeHtml(item.property) + "</td>";
          html += "<td>" + escapeHtml(item.reportTo) + "</td>";
          html += "<td class='right'>" + money(item.amountToReport) + "</td>";
          html += "<td class='right'>" + money(item.totalTax) + "</td>";
          html += "</tr>";
        });

        html += "<tr>";
        html += "<th>Total</th>";
        html += "<th></th>";
        html += "<th class='right'>" + money(totalAmount) + "</th>";
        html += "<th class='right'>" + money(totalTax) + "</th>";
        html += "</tr>";
        html += "</table>";

        document.getElementById("tableWrap").innerHTML = html;
        showStatus("Information loaded successfully.", "ok");
      } catch (err) {
        renderEmptyTable("Could not load data.");
        showStatus(err.message || "Failed loading report", "error");
        console.error(err);
      }
    }

    function populateMonthDropdown() {
      const months = [
        "January", "February", "March", "April", "May", "June",
        "July", "August", "September", "October", "November", "December"
      ];

      const sel = document.getElementById("monthSelect");
      sel.innerHTML = "";

      months.forEach((name, index) => {
        const option = document.createElement("option");
        option.value = index + 1;
        option.textContent = name;
        sel.appendChild(option);
      });
    }

    function populateYearDropdown() {
      const sel = document.getElementById("yearSelect");
      sel.innerHTML = "";

      const currentYear = new Date().getFullYear();
      for (let y = currentYear + 1; y >= 2023; y--) {
        const option = document.createElement("option");
        option.value = y;
        option.textContent = y;
        sel.appendChild(option);
      }
    }

    const now = new Date();
    populateMonthDropdown();
    populateYearDropdown();
    document.getElementById("monthSelect").value = now.getMonth() + 1;
    document.getElementById("yearSelect").value = now.getFullYear();
    document.getElementById("runBtn").addEventListener("click", runReport);
    window.addEventListener("load", runReport);
  </script>
</body>
</html>
